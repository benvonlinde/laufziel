<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Laufziel</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">

    <header class="topbar">
      <div class="topbar-row main">
        <div class="year-group">
          <button class="year-btn" id="yearPrev" type="button" data-i18n-attr="aria-label|yearPrev" aria-label="Vorheriges Jahr">‹</button>
          <div class="year" id="yearLabel">2026</div>
          <button class="year-btn" id="yearNext" type="button" data-i18n-attr="aria-label|yearNext" aria-label="Nächstes Jahr">›</button>
        </div>
        <div class="user-chip" id="userChip" hidden>
          <button class="user-chip-btn" id="userChipBtn" type="button" data-i18n-attr="aria-label|account" aria-label="Konto">
            <span class="user-avatar" id="userChipAvatar"></span>
            <span class="user-name" id="userChipName"></span>
          </button>
          <div class="user-popover" id="userPopover" hidden role="menu">
            <div class="user-popover-name"  id="userPopoverName"></div>
            <div class="user-popover-email" id="userPopoverEmail"></div>
            <button class="secondary block" id="userPopoverSignOut" type="button" data-i18n="signOut">Abmelden</button>
          </div>
        </div>
      </div>
      <div class="topbar-row controls">
        <button class="goal-chip" id="goalChip" type="button">
          <span id="goalLabel">1000</span> km
        </button>
      </div>
    </header>

    <section class="card hero signed-out-hero" id="signedOutHero" hidden>
      <h2 class="card-title" data-i18n="welcomeTitle">Willkommen</h2>
      <p data-i18n="welcomeBody">Melde dich mit Google an, um deine Läufe zu sehen und einzutragen.</p>
      <button class="primary block" id="signInBtn" type="button" data-i18n="signInWithGoogle">Mit Google anmelden</button>
      <p class="form-error" id="signInError" hidden></p>
    </section>

    <section class="card add-form" data-signed-in-only>
      <h2 class="card-title" data-i18n="newRun">Neuer Lauf</h2>
      <form id="runForm" novalidate>
        <div class="row two">
          <label class="field">
            <span data-i18n="distanceLabel">Distanz (km)</span>
            <input id="distInput" type="text" inputmode="decimal" autocomplete="off"
                   data-i18n-attr="placeholder|distancePlaceholder"
                   placeholder="z. B. 8,4" required />
          </label>
          <label class="field">
            <span data-i18n="dateLabel">Datum</span>
            <span class="date-field">
              <span class="date-display" aria-hidden="true">
                <span id="dateDisplayText">—</span>
                <span class="date-chevron">▾</span>
              </span>
              <input id="dateInput" type="date" required />
            </span>
          </label>
        </div>
        <button type="submit" class="primary" data-i18n="submitRun">Lauf eintragen</button>
        <p class="form-error" id="formError" hidden></p>
      </form>
    </section>

    <section class="card week" data-signed-in-only>
      <h2 class="card-title">
        <span data-i18n="thisWeek">Diese Woche</span>
        <span class="kw" id="kwLabel">KW –</span>
      </h2>
      <div class="week-numbers">
        <span class="km-week" id="weekKm">0,0</span>
        <span class="km-week-of">/ <span id="weekTarget">18,87</span> km</span>
      </div>
      <div class="progress small" aria-hidden="true">
        <div class="progress-bar" id="weekBar"></div>
      </div>
      <div class="diff" id="weekDiffLine" hidden>
        <span class="diff-value" id="weekDiffValue">±0,00 km</span>
        <span class="diff-text"  id="weekDiffText">auf Kurs</span>
      </div>
    </section>

    <section class="card hero" data-signed-in-only>
      <h2 class="card-title" data-i18n="yearGoal">Jahresziel</h2>
      <div class="hero-numbers">
        <div class="km-now" id="kmNow">0</div>
        <div class="km-of">/ <span id="kmGoal">1000</span> km</div>
      </div>
      <div class="progress" aria-hidden="true">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="hero-meta">
        <span id="percentLabel">0,0 %</span>
        <span class="dot">·</span>
        <span id="remainingLabel">noch 1000 km</span>
      </div>
      <div class="diff" id="diffLine">
        <span class="diff-value" id="diffValue">±0,00 km</span>
        <span class="diff-text" id="diffText">auf Kurs</span>
      </div>
    </section>

    <section class="card chart-card" data-signed-in-only>
      <h2 class="card-title">
        <span data-i18n="history">Verlauf</span>
        <span class="chart-tabs" role="tablist">
          <button class="chart-tab" id="chartTab3m"   type="button" role="tab" aria-pressed="true"  data-i18n="threeMonths">3 Monate</button>
          <button class="chart-tab" id="chartTabYear" type="button" role="tab" aria-pressed="false" data-i18n="yearTab">Jahr</button>
        </span>
      </h2>
      <div class="chart-wrap">
        <canvas id="progressChart"></canvas>
      </div>
    </section>

    <section class="card runs" data-signed-in-only>
      <h2 class="card-title">
        <span data-i18n="recentRuns">Letzte Läufe</span>
        <button class="link-btn link-btn-corner" id="showAllRuns" type="button" hidden>Alle anzeigen</button>
      </h2>
      <ul class="runs-list" id="runsList"></ul>
    </section>

    <details class="card settings" data-signed-in-only>
      <summary data-i18n="settingsTitle">Einstellungen</summary>
      <div class="settings-body">
        <label class="field">
          <span><span data-i18n="goalForYear">Ziel</span> <span class="muted" id="goalYear">2026</span> (km)</span>
          <input type="number" id="goalActiveInput" min="1" step="1" />
        </label>
        <label class="field">
          <span><span data-i18n="goalForNextYear">Ziel nächstes Jahr</span> (<span id="goalNextYear">2027</span>) (km)</span>
          <input type="number" id="goalNextInput" min="1" step="1" data-i18n-attr="placeholder|notSetYet" placeholder="noch nicht gesetzt" />
        </label>
        <label class="field">
          <span data-i18n="languageLabel">Sprache</span>
          <select id="langSelect">
            <option value="de" data-i18n="langDe">Deutsch</option>
            <option value="en" data-i18n="langEn">English</option>
          </select>
        </label>
        <div class="settings-actions">
          <button class="secondary" id="exportBtn" type="button" data-i18n="exportJson">JSON exportieren</button>
          <button class="secondary" id="signOutBtn" type="button" data-i18n="signOut">Abmelden</button>
        </div>
      </div>
    </details>

    <footer class="foot muted">
      <span id="storageNote" class="status-line">
        <span class="status-dot" id="statusDot" data-state="offline"></span>
        <span id="statusText">offline</span>
      </span>
    </footer>

  </main>

  <div class="toast" id="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="script.js" defer></script>
</body>
</html>
